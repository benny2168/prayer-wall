version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: prayer-wall-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: prayerwall
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    container_name: prayer-wall-web
    restart: always
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://admin:admin123@db:5432/prayerwall?schema=public
    depends_on:
      - db

volumes:
  pgdata:
