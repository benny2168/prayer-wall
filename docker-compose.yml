# Prayer Wall Production Stack

services:
  db:
    image: postgres:15-alpine
    container_name: prayer-wall-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: prayerwall
    volumes:
      - ${DATA_BASE_PATH:-./data}/db:/var/lib/postgresql/data

  web:
    image: ${DOCKER_USERNAME:-mtcdtech}/prayer-wall:latest
    container_name: prayer-wall-web
    restart: always
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-admin}:${DB_PASSWORD:-admin123}@db:5432/${DB_NAME:-prayerwall}?schema=public
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3001}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - TRUST_PROXY=true
      - PLANNING_CENTER_CLIENT_ID=${PLANNING_CENTER_CLIENT_ID}
      - PLANNING_CENTER_CLIENT_SECRET=${PLANNING_CENTER_CLIENT_SECRET}
      - PLANNING_CENTER_PAT_ID=${PLANNING_CENTER_PAT_ID}
      - PLANNING_CENTER_PAT_SECRET=${PLANNING_CENTER_PAT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - MEMBER_SESSION_SECRET=${MEMBER_SESSION_SECRET}
      - CRON_SECRET=${CRON_SECRET}
      - LOCAL_ADMIN_USERNAME=${LOCAL_ADMIN_USERNAME}
      - LOCAL_ADMIN_PASSWORD=${LOCAL_ADMIN_PASSWORD}
      - SITE_URL=${SITE_URL}
    depends_on:
      - db
    volumes:
      - ${DATA_BASE_PATH:-./data}/uploads:/app/data/uploads
